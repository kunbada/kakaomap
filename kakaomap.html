<!-- kakaomap.html — GitHub Pages에 올릴 파일 -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { margin: 0; }
    #map { width: 100%; height: 100vh; }
    #status { position: fixed; bottom: 10px; left: 10px;
              background: rgba(0,0,0,0.6); color: #fff;
              padding: 6px 10px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="status">지도 로딩 중...</div>

  <script>
    var JS_KEY = "099b15d3a927ae4c769c9345c140903f";
    var map = null;

    // 카카오맵 초기화
    var s = document.createElement('script');
    s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + JS_KEY + '&autoload=false';
    s.onload = function() {
      kakao.maps.load(function() {
        map = new kakao.maps.Map(document.getElementById('map'), {
          center: new kakao.maps.LatLng(37.8122, 127.0458),
          level: 8
        });
        document.getElementById('status').innerText = '✅ 준비 완료 — 데이터 대기 중';
      });
    };
    document.head.appendChild(s);

    // ✅ 구글 시트 사이드바에서 postMessage로 데이터 수신
    window.addEventListener('message', function(e) {
      var data = e.data;
      if (!data || !Array.isArray(data)) return;
      if (!map) { setTimeout(function(){ window.dispatchEvent(new MessageEvent('message', {data: data})); }, 500); return; }

      var bounds = new kakao.maps.LatLngBounds();
      data.forEach(function(loc) {
        if (loc.lat && loc.lng) {
          var pos = new kakao.maps.LatLng(loc.lat, loc.lng);
          new kakao.maps.Marker({ position: pos, map: map });
          bounds.extend(pos);
        }
      });
      map.setBounds(bounds);
      document.getElementById('status').innerText = data.length + '개 지점 표시 완료!';
    });
  </script>
</body>
</html>
